name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger bei Tags wie v1.0, v0.1.0-beta, etc.
  workflow_dispatch: # Ermöglicht das manuelle Starten über die GitHub-Webseite

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Read Version and Changelog
        id: get_version
        shell: pwsh
        run: |
          $v = Get-Content version.txt -Raw
          echo "VERSION=$($v.Trim())" >> $env:GITHUB_OUTPUT
          
          # Read changelog and handle multiline output for GitHub Actions
          $changelog = Get-Content changelog.md -Raw
          echo "CHANGELOG<<EOF" >> $env:GITHUB_OUTPUT
          echo $changelog >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon "data/ui/a117ttv.ico" --name "Anno117_TechTree_Viewer" --add-data "data/ui/kofi5.webp;data/ui" --add-data "data/ui/techbg.jpg;data/ui" --add-data "version.txt;." --add-data "data/ui/a117ttv.ico;data/ui" --add-data "data/base;data/base" Anno117_TechTree_Viewer.py

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Anno117_TechTree_Viewer.exe
          name: ${{ github.ref_type == 'tag' && format('v{0}', steps.get_version.outputs.VERSION) || format('Development Build - v{0}', steps.get_version.outputs.VERSION) }}
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          generate_release_notes: true
          body: |
            Automatic build of version ${{ steps.get_version.outputs.VERSION }}.

            ${{ steps.get_version.outputs.CHANGELOG }}

            ### Changes
            See the automatic release notes below or the commit history.
            
            ### Download
            You can find the executable file in the Assets section below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}