name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger bei Tags wie v1.0, v0.1.0-beta, etc.
  workflow_dispatch: # Ermöglicht das manuelle Starten über die GitHub-Webseite

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Read Version from File
        id: get_version
        shell: pwsh
        run: |
          $v = Get-Content version.txt -Raw
          echo "VERSION=$($v.Trim())" >> $env:GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon "a117ttv.ico" --name "Anno117_TechTree_Viewer" --add-data "kofi5.webp;." --add-data "techbg.jpg;." --add-data "version.txt;." --add-data "a117ttv.ico;." Anno117_TechTree_Viewer.py

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Anno117_TechTree_Viewer.exe
          name: ${{ github.ref_type == 'tag' && format('v{0}', steps.get_version.outputs.VERSION) || format('Development Build - v{0}', steps.get_version.outputs.VERSION) }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          generate_release_notes: true
          body: |
            Automatischer Build der Version ${{ steps.get_version.outputs.VERSION }}.
            
            ### Änderungen
            Siehe automatische Release-Notes unten oder Commit-Historie.
            
            ### Download
            Die ausführbare Datei findest du unten bei den Assets.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}